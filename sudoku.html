<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>스도쿠</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;align-items:flex-start}
#app{padding:16px;max-width:420px;width:100%}
h1{font-size:22px;font-weight:600;color:#111;text-align:center;margin-bottom:4px}
#timer{font-size:14px;color:#888;text-align:center;margin-bottom:6px}
#status{font-size:13px;color:#555;text-align:center;margin-bottom:12px;min-height:18px}
#board{display:grid;grid-template-columns:repeat(9,1fr);border:2.5px solid #111;border-radius:6px;overflow:hidden;margin-bottom:14px;background:#fff}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,4vw,20px);font-weight:400;border:0.5px solid #ccc;cursor:pointer;color:#111;user-select:none;-webkit-tap-highlight-color:transparent}
.cell.given{font-weight:700;color:#111}
.cell.selected{background:#cce5ff}
.cell.same-num{background:#e8f4fd}
.cell.error{color:#d32f2f}
.cell.br{border-right:2.5px solid #111}
.cell.bb{border-bottom:2.5px solid #111}
#numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.num-btn{padding:clamp(8px,2.5vw,14px) 0;font-size:clamp(16px,4.5vw,22px);font-weight:500;background:#fff;border:1px solid #ddd;border-radius:8px;cursor:pointer;color:#111;-webkit-tap-highlight-color:transparent}
.num-btn:active{background:#eee;transform:scale(0.95)}
#controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ctrl-btn{padding:12px;font-size:14px;background:#fff;border:1px solid #ddd;border-radius:8px;cursor:pointer;color:#111;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{background:#eee}
#hint-count{font-size:12px;color:#aaa;text-align:center}
.complete-msg{font-size:15px;color:#2e7d32;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <h1>스도쿠</h1>
  <div id="timer">00:00</div>
  <div id="status">빈 칸을 선택하고 숫자를 입력하세요</div>
  <div id="board"></div>
  <div id="numpad"></div>
  <div id="controls">
    <button class="ctrl-btn" onclick="erase()">지우기</button>
    <button class="ctrl-btn" onclick="getHint()">힌트</button>
    <button class="ctrl-btn" onclick="newGame()">새 게임</button>
    <button class="ctrl-btn" onclick="checkBoard()">확인</button>
  </div>
  <div id="hint-count"></div>
</div>

<script>
let solution=[], puzzle=[], userGrid=[], selected=-1, hints=0, startTime=Date.now(), timerInterval, finished=false;

function baseSolution(){
  return [5,3,4,6,7,8,9,1,2,6,7,2,1,9,5,3,4,8,1,9,8,3,4,2,5,6,7,8,5,9,7,6,1,4,2,3,4,2,6,8,5,3,7,9,1,7,1,3,9,2,4,8,5,6,9,6,1,5,3,7,2,8,4,2,8,7,4,1,9,6,3,5,3,4,5,2,8,6,1,7,9];
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function rotateSolution(base){
  const rowPerm=shuffle([0,1,2]);
  const colPerm=shuffle([0,1,2]);
  const nums=shuffle([1,2,3,4,5,6,7,8,9]);
  const numMap={};
  for(let i=0;i<9;i++) numMap[i+1]=nums[i];
  const res=Array(81).fill(0);
  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const rb=Math.floor(r/3)*3+rowPerm[r%3];
      const cb=Math.floor(c/3)*3+colPerm[c%3];
      res[r*9+c]=numMap[base[rb*9+cb]];
    }
  }
  return res;
}

function makePuzzle(sol){
  const p=[...sol];
  const cells=shuffle([...Array(81).keys()]);
  let removed=0;
  for(const idx of cells){
    if(removed>=46) break;
    p[idx]=0;
    removed++;
  }
  return p;
}

function newGame(){
  clearInterval(timerInterval);
  finished=false;
  solution=rotateSolution(baseSolution());
  puzzle=makePuzzle(solution);
  userGrid=[...puzzle];
  selected=-1;
  hints=0;
  startTime=Date.now();
  timerInterval=setInterval(updateTimer,1000);
  document.getElementById('status').textContent='빈 칸을 선택하고 숫자를 입력하세요';
  document.getElementById('status').className='';
  document.getElementById('hint-count').textContent='';
  render();
}

function updateTimer(){
  if(finished) return;
  const s=Math.floor((Date.now()-startTime)/1000);
  const m=Math.floor(s/60);
  const sec=s%60;
  document.getElementById('timer').textContent=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let i=0;i<81;i++){
    const r=Math.floor(i/9), c=i%9;
    const cell=document.createElement('div');
    cell.className='cell';
    if(c===2||c===5) cell.classList.add('br');
    if(r===2||r===5) cell.classList.add('bb');
    if(puzzle[i]!==0){
      cell.classList.add('given');
      cell.textContent=puzzle[i];
    } else if(userGrid[i]!==0){
      cell.textContent=userGrid[i];
      if(userGrid[i]!==solution[i]) cell.classList.add('error');
    }
    if(i===selected) cell.classList.add('selected');
    else if(selected!==-1 && userGrid[selected]!==0 && userGrid[i]===userGrid[selected]) cell.classList.add('same-num');
    cell.onclick=()=>selectCell(i);
    board.appendChild(cell);
  }

  const numpad=document.getElementById('numpad');
  numpad.innerHTML='';
  for(let n=1;n<=9;n++){
    const btn=document.createElement('button');
    btn.className='num-btn';
    btn.textContent=n;
    btn.onclick=()=>inputNum(n);
    numpad.appendChild(btn);
  }
  const eraseBtn=document.createElement('button');
  eraseBtn.className='num-btn';
  eraseBtn.style.fontSize='18px';
  eraseBtn.textContent='✕';
  eraseBtn.onclick=erase;
  numpad.appendChild(eraseBtn);
}

function selectCell(i){
  selected=i;
  render();
}

function inputNum(n){
  if(finished||selected===-1||puzzle[selected]!==0) return;
  userGrid[selected]=n;
  render();
  checkComplete();
}

function erase(){
  if(finished||selected===-1||puzzle[selected]!==0) return;
  userGrid[selected]=0;
  render();
}

function getHint(){
  if(finished) return;
  if(selected===-1||userGrid[selected]!==0){
    const empties=[];
    for(let i=0;i<81;i++) if(puzzle[i]===0&&userGrid[i]===0) empties.push(i);
    if(empties.length===0){document.getElementById('status').textContent='모든 칸이 채워졌습니다';return;}
    selected=empties[Math.floor(Math.random()*empties.length)];
  }
  if(puzzle[selected]!==0) return;
  userGrid[selected]=solution[selected];
  hints++;
  document.getElementById('status').textContent='힌트 적용!';
  document.getElementById('hint-count').textContent='힌트 사용: '+hints+'회';
  render();
  checkComplete();
}

function checkBoard(){
  let errors=0;
  const empty=userGrid.filter((v,i)=>puzzle[i]===0&&v===0).length;
  for(let i=0;i<81;i++){
    if(userGrid[i]!==0&&userGrid[i]!==solution[i]) errors++;
  }
  if(errors===0&&empty===0){
    document.getElementById('status').textContent='완성! 정답입니다!';
  } else if(errors===0){
    document.getElementById('status').textContent='오류 없음 — 빈 칸 '+empty+'개 남음';
  } else {
    document.getElementById('status').textContent='오류 '+errors+'개 발견 (빨간 숫자 확인)';
  }
}

function checkComplete(){
  for(let i=0;i<81;i++){
    if(userGrid[i]!==solution[i]) return;
  }
  finished=true;
  clearInterval(timerInterval);
  const s=Math.floor((Date.now()-startTime)/1000);
  const m=Math.floor(s/60);
  const sec=s%60;
  const st=document.getElementById('status');
  st.textContent='🎉 완성! '+m+'분 '+sec+'초 / 힌트 '+hints+'회';
  st.className='complete-msg';
}

newGame();
</script>
</body>
</html>
